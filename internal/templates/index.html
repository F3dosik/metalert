<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Список метрик</title>
</head>
<body>
  <h1>Метрики</h1>
<table border="1">
  <thead>
    <tr>
      <th colspan="2">Gauges</th>
    </tr>
    <tr>
      <th>metName</th>
      <th>metValue</th>
    </tr>
  </thead>
  <tbody>
    {{range $key, $value := .Gauges}}
    <tr>
      <td>{{$key}}</td>
      <td>{{$value}}</td>
    </tr>
    {{end}}
  </tbody>

  <thead>
    <tr>
      <th colspan="2">Counters</th>
    </tr>
    <tr>
      <th>metName</th>
      <th>metValue</th>
    </tr>
  </thead>
  <tbody>
    {{range $key, $value := .Counters}}
    <tr>
      <td>{{$key}}</td>
      <td>{{$value}}</td>
    </tr>
    {{end}}
  </tbody>
</table>

</body>
</html>
